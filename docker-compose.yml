services:

  postgres:
    image: postgres:16

    container_name: brandpilot-postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: brandpilot
      POSTGRES_USER: brandpilot
      POSTGRES_PASSWORD: brandpilot123

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend

    container_name: brandpilot-backend

    restart: unless-stopped

    env_file:
      - .env

    ports:
      - "8000:8000"

    depends_on:
      - postgres

volumes:
  postgres_data: